version: '3.8'

services:
  luma-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luma-ui
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./docs/docs/.vitepress/dist:/app/docs/docs/.vitepress/dist:ro
    networks:
      - luma-network
    labels:
      - "com.example.description=Luma UI Documentation Server"

  nginx:
    image: nginx:alpine
    container_name: luma-ui-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - luma-ui
    restart: unless-stopped
    networks:
      - luma-network

networks:
  luma-network:
    driver: bridge

# Для использования:
# docker-compose up -d              # Запустить в фоне
# docker-compose down               # Остановить
# docker-compose logs -f            # Просмотр логов
# docker-compose ps                 # Статус контейнеров
